name: Deploy playground to GitHub Pages

# Publishes the static playground in web/ to GitHub Pages.
# Enable it once via: Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token, plus what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress prod deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (web/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
